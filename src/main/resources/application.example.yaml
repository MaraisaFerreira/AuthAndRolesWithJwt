api:
  token:
    secret: ${JWT_SECRET_KEY:${file:src/main/resources/jwt-key.secret}}
spring:
  application:
    name: AuthAndRolesWithJwt
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/db_auth?useTimezone=true&serverTimezone=UTC
    username: USER
    password: PASSWORD
  jpa:
    hibernate:
      ddl-auto: update #none 2 flyway
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: warn
    study.mf: info